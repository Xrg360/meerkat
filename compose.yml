services:
  meerkat:
    build: .
    container_name: meerkat
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config:/app/config
      - ./state:/app/state
    environment:
      TZ: Asia/Kolkata
      PORT: 8710
      MEERKAT_API_PORT: 8711
      MEERKAT_API_BASE: http://127.0.0.1:8711
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      MEERKAT_TELEGRAM_BOT_TOKEN: ${MEERKAT_TELEGRAM_BOT_TOKEN:-}
      MEERKAT_TELEGRAM_CHAT_ID: ${MEERKAT_TELEGRAM_CHAT_ID:-}
      MEERKAT_ACTION_TOKEN: ${MEERKAT_ACTION_TOKEN:-}

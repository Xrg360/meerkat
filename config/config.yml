telegram:
  bot_token:
  chat_id:

network:
  ethernet: enp2s0
  wifi: wlp1s0

cpu:
  threshold: 90

ram:
  threshold: 90

disk:
  threshold: 90
  paths:
    - /

temperature:
  threshold: 80

internet:
  hosts:
    - 1.1.1.1
    - 8.8.8.8
  timeout: 2
  severity: critical

alerting:
  duration: 0
  cooldown: 15m

api:
  enabled: true
  host: 0.0.0.0
  port: 8710

actions:
  enabled: true
  token:
  blocked_containers:
    - meerkat

auto_heal:
  enabled: true
  interval: 300
  repair_cooldown: 300
  containers:
    enabled: true
  network:
    enabled: true

sites:
  - name: Cloudflare DNS
    url: https://1.1.1.1
    expected_status:
      - 200
      - 301
      - 302
    timeout: 5
    follow_redirects: true
    severity: critical
    duration: 30s
    cooldown: 15m

interval: 30
